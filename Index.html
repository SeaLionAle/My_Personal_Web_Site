<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alessio Colombo</title>
    <link rel="stylesheet" href="Aside.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/bbb4978af8.js"
      crossorigin="anonymous"
    ></script>
    <style>
      :root {
        --bg-body: #1b1b24;
        --bg-main: #1e1e28;
        --bg-card: #2b2b35;
        --accent-color: #ffc107;
        --text-primary: #ffffff;
        --text-secondary: #8c8c8e;

        --font-heading: "Montserrat";
        --font-body: "Roboto";
        --font-code: "Fira Code";

        --font-weight-headings: 700;
        --font-weight-body: 400;

        --font-size-body: 16px;
      }
      body {
        background-color: var(--bg-body);
        color: var(--text-secondary);
        font-family: var(--font-body);
        font-weight: var(--font-weight-body);
        font-size: var(--font-size-body);

        display: flex;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <aside>
      <div id="Hero_Section">
        <div id="Img_Me">
          <img src="Imgs/Hero.png" alt="Alessio Colombo" />
        </div>
        <p>Alessio Colombo</p>
        <p>Front-end Developer<br />& Bugs Fixer</p>
      </div>
      <div id="Aside_Border">
        <div id="Hero_Info1">
          <ul>
            <li>Residence:</li>
            <li>Age:</li>
          </ul>
          <ul>
            <li>Italy</li>
            <li>21</li>
          </ul>
        </div>
        <div id="Hero_Info2">
          <div class="Language">
            <div class="Circle" style="--p: 100">
              <p>100%</p>
            </div>
            <p>Italian</p>
          </div>
          <div class="Language">
            <div class="Circle" style="--p: 90">
              <p>90%</p>
            </div>
            <p>English</p>
          </div>
        </div>
        <div id="Tech_Stack">
          <div class="Stack">
            <p>HTML</p>
            <p>85 %</p>
          </div>
          <div class="Progress_Bar_Bg">
            <div class="Progress_Bar" style="width: 85%"></div>
          </div>
          <div class="Stack">
            <p>CSS</p>
            <p>90 %</p>
          </div>
          <div class="Progress_Bar_Bg">
            <div class="Progress_Bar" style="width: 90%"></div>
          </div>
          <div class="Stack">
            <p>JAVASCRIPT</p>
            <p>70 %</p>
          </div>
          <div class="Progress_Bar_Bg">
            <div class="Progress_Bar" style="width: 70%"></div>
          </div>
          <div class="Stack">
            <p>PHP</p>
            <p>60 %</p>
          </div>
          <div class="Progress_Bar_Bg">
            <div class="Progress_Bar" style="width: 60%"></div>
          </div>
          <div class="Stack">
            <p>C</p>
            <p>80 %</p>
          </div>
          <div class="Progress_Bar_Bg">
            <div class="Progress_Bar" style="width: 80%"></div>
          </div>
        </div>
      </div>
      <div id="Aside_Contact">
        <i class="fa-brands fa-discord fa-2xl"></i>
        <i class="fa-brands fa-github fa-2xl"></i>
        <i class="fa-solid fa-envelope fa-2xl"></i>
        <i class="fa-brands fa-linkedin fa-2xl"></i>
      </div>
    </aside>
    <div id="About_Me">
      <h2></h2>
    </div>
    <div id="Portfolio">
      <h2></h2>
    </div>
    <div id="Contact">
      <h2></h2>
    </div>
  </body>
</html>
